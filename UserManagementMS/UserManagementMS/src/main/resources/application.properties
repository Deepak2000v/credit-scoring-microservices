server.port=8081
spring.application.name=UserManagementMS

# =====================
# MySQL Database Config
# =====================
spring.datasource.url=jdbc:mysql://localhost:3306/user_management_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=2000
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================
# JPA / Hibernate
# =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =====================
# JWT Secret Key
# =====================
jwt.secret=MySuperSecretKey12345MySuperSecretKey12345MySuperSecretKey12345

# =====================
# OAuth2 Google Config
# Replace client-id and client-secret with your Google Cloud Console credentials
# =====================
# =====================
# OAuth2 Google Config
# =====================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
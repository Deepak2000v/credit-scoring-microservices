server.port=8080
spring.application.name=SpringCloudGateway

# =====================================================================
# ROUTING RULES
# The Angular UI talks ONLY to this Gateway on port 8080.
# Gateway reads these routes and forwards to the correct microservice.
# =====================================================================

# ----- Route 1: UserManagementMS -----
# Any request to /users/** or /login or /register
# is forwarded to UserManagementMS on port 8081
spring.cloud.gateway.routes[0].id=user-management-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/**, /login, /register, /oauth2/**

# ----- Route 2: CreditScoringServiceMS -----
# Any request to /score/**, /data/**, /credit/**
# is forwarded to CreditScoringServiceMS on port 8082
spring.cloud.gateway.routes[1].id=credit-scoring-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/score/**, /data/**, /credit/**

# =====================================================================
# JWT Secret (must match the secret used in UserManagementMS)
# =====================================================================
jwt.secret=MySuperSecretKey12345MySuperSecretKey12345MySuperSecretKey12345

# =====================================================================
# CORS - Allow requests from the Angular frontend
# =====================================================================
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=http://localhost:4200
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowCredentials=true

# =====================================================================
# Logging
# =====================================================================
logging.level.org.springframework.cloud.gateway=INFO
logging.level.com.spring.cloudgateway=DEBUG

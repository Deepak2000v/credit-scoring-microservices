server.port=8082
spring.application.name=CreditScoringServiceMS

# =====================
# MySQL Database Config
# =====================
spring.datasource.url=jdbc:mysql://localhost:3306/credit_scoring_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=2000
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================
# JPA / Hibernate
# =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =====================
# Redis Cache Config
# =====================
spring.data.redis.host=localhost
spring.data.redis.port=6379
# spring.redis.password=yourpassword   # Uncomment if Redis requires authentication

# =====================
# Kafka Config
# =====================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=claim-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# =====================
# Email Config (Gmail SMTP)
# Replace with your actual Gmail credentials
# =====================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =====================
# Log4j2 Config
# =====================
rootLogger.level=info
rootLogger.appenderRefs=stdout, file
rootLogger.appenderRef.stdout.ref=Standard Console
rootLogger.appenderRef.file.ref=File

# =====================
# UserManagementMS Base URL
# (Used by WebClient to fetch user details)
# =====================
user.management.service.url=http://localhost:8081

# =====================
# Splunk HEC Config
# Replace with your Splunk instance details
# =====================
splunk.hec.uri=https://your-splunk-instance:8088
splunk.hec.token=your-hec-token
splunk.hec.index=your-index
